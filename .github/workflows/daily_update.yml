name: Daily YouTube Search

on:
  schedule:
    # Elke dag om 09:00 UTC (=10:00 CET)
    - cron: '0 9 * * *'
  # Manual trigger option
  workflow_dispatch:

jobs:
  update-videos:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Search YouTube videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python tools/search_youtube_videos.py

      - name: Copy results to root
        run: cp .tmp/youtube_results.json youtube_results.json

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add youtube_results.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update YouTube videos - $(date +'%Y-%m-%d')"
            git push
          fi
