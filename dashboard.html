<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Videos Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: 2px solid #ff6b6b;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #999;
            font-size: 1.1em;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        label {
            font-weight: 500;
            color: #ccc;
        }

        select, input {
            padding: 10px 15px;
            background: #2a2a3e;
            border: 1px solid #404050;
            color: #e0e0e0;
            border-radius: 6px;
            font-size: 0.95em;
            cursor: pointer;
        }

        select:hover, input:hover {
            border-color: #ff6b6b;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
        }

        button {
            padding: 10px 20px;
            background: #ff6b6b;
            border: none;
            color: white;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #1a1a2e;
            padding: 15px 30px;
            border-radius: 8px;
            border-left: 4px solid #ff6b6b;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #ff6b6b;
        }

        .stat-label {
            font-size: 0.9em;
            color: #999;
            margin-top: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .video-card {
            background: #1a1a2e;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #2a2a3e;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: #ff6b6b;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.2);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #0f0f1e;
            overflow: hidden;
        }

        .thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            color: #ff6b6b;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-card:hover .play-icon {
            opacity: 1;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-channel {
            font-size: 0.9em;
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85em;
            color: #999;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 5px;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            background: #2a2a3e;
            border-radius: 4px;
            font-size: 0.8em;
        }

        .views-badge {
            color: #4ecdc4;
        }

        .likes-badge {
            color: #ff6b6b;
        }

        .video-description {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .watch-button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            color: white;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .watch-button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .day-section {
            margin-bottom: 40px;
        }

        .day-header {
            font-size: 1.3em;
            font-weight: 600;
            color: #ff6b6b;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2a2a3e;
        }

        .day-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .loading-spinner {
            border: 3px solid #2a2a3e;
            border-top: 3px solid #ff6b6b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                flex-direction: column;
                width: 100%;
            }

            select, input {
                width: 100%;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Claude Code Videos Dashboard</h1>
            <p class="subtitle">Nieuwe video's uit de afgelopen maand</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="languageSelect">Taal:</label>
                <select id="languageSelect">
                    <option value="all">Alle talen</option>
                    <option value="en">🇬🇧 Engels</option>
                    <option value="nl">🇳🇱 Nederlands</option>
                </select>
            </div>

            <div class="control-group">
                <label for="sortSelect">Sorteren op:</label>
                <select id="sortSelect">
                    <option value="date-grouped">Per dag (nieuwste eerst)</option>
                    <option value="views">Meeste views</option>
                    <option value="likes">Meeste likes</option>
                    <option value="duration">Langste</option>
                </select>
            </div>

            <div class="control-group">
                <label for="searchInput">Zoeken:</label>
                <input type="text" id="searchInput" placeholder="Zoek in titels...">
            </div>

            <button onclick="loadData()">🔄 Vernieuwen</button>
        </div>

        <div class="stats" id="stats"></div>

        <div id="content"></div>
    </div>

    <script>
        let allVideos = [];

        // Detect language of text
        function detectLanguage(text) {
            if (!text) return 'other';

            // Common English words
            const englishWords = ['how', 'learn', 'build', 'tutorial', 'guide', 'master', 'full', 'tips', 'skills', 'code', 'claude', 'ai'];
            // Common Dutch words
            const dutchWords = ['hoe', 'leer', 'bouw', 'les', 'gids', 'beheers', 'volledige', 'tips', 'vaardigheden', 'code'];

            const lowerText = text.toLowerCase();

            let englishCount = englishWords.filter(word => lowerText.includes(word)).length;
            let dutchCount = dutchWords.filter(word => lowerText.includes(word)).length;

            // If very few matches, check character patterns
            if (englishCount + dutchCount < 2) {
                // Dutch characters: ij, uu, aa, etc.
                if (/[áéíóúàèìòù]/.test(lowerText) || /(ch|sch|ng|nk)/.test(lowerText)) {
                    dutchCount += 1;
                }
                // English is more likely by default for tech content
                englishCount += 1;
            }

            if (dutchCount > englishCount) return 'nl';
            return 'en';
        }

        async function loadData() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Data laden...</p></div>';

            try {
                const response = await fetch('.tmp/youtube_results.json');
                if (!response.ok) throw new Error('Kan data niet laden');

                allVideos = await response.json();
                renderVideos(allVideos);
                updateStats();
            } catch (error) {
                content.innerHTML = `<div class="no-data">
                    <p>❌ Fout bij laden van data</p>
                    <p style="font-size: 0.9em; margin-top: 10px;">Zorg dat je eerst het script hebt uitgevoerd:</p>
                    <p style="font-size: 0.85em; margin-top: 10px; color: #666;">python tools/search_youtube_videos.py</p>
                </div>`;
            }
        }

        function updateStats() {
            if (!allVideos.length) return;

            const totalViews = allVideos.reduce((sum, v) => sum + v.viewCount, 0);
            const totalLikes = allVideos.reduce((sum, v) => sum + v.likeCount, 0);
            const avgViews = Math.round(totalViews / allVideos.length);

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${allVideos.length}</div>
                    <div class="stat-label">Video's gevonden</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${(totalViews / 1000000).toFixed(1)}M</div>
                    <div class="stat-label">Totale views</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${(avgViews / 1000).toFixed(0)}K</div>
                    <div class="stat-label">Gemiddeld per video</div>
                </div>
            `;
        }

        function renderVideos(videos, groupByDate = false) {
            const content = document.getElementById('content');

            if (!videos.length) {
                content.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎯</div><p>Geen video\'s gevonden</p></div>';
                return;
            }

            if (groupByDate) {
                // Group by date
                const grouped = {};
                videos.forEach(video => {
                    const date = new Date(video.publishedAt);
                    const dateKey = date.toLocaleDateString('nl-NL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                    if (!grouped[dateKey]) grouped[dateKey] = [];
                    grouped[dateKey].push(video);
                });

                // Sort dates descending (newest first)
                const sortedDates = Object.keys(grouped).sort((a, b) => {
                    return new Date(b) - new Date(a);
                });

                let html = '';
                sortedDates.forEach(dateKey => {
                    html += `
                        <div class="day-section">
                            <div class="day-header">${dateKey}</div>
                            <div class="day-grid">
                                ${grouped[dateKey].map(video => createVideoCard(video)).join('')}
                            </div>
                        </div>
                    `;
                });

                content.innerHTML = html;
            } else {
                const html = `
                    <div class="grid">
                        ${videos.map(video => createVideoCard(video)).join('')}
                    </div>
                `;
                content.innerHTML = html;
            }
        }

        function createVideoCard(video) {
            return `
                <a href="${video.url}" target="_blank" class="video-card">
                    <div class="thumbnail-container">
                        <img src="https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg" alt="${video.title}" class="thumbnail">
                        <div class="play-icon">▶</div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-channel">📺 ${video.channel}</div>
                        <div class="video-meta">
                            <span class="badge views-badge">👁️ ${formatNumber(video.viewCount)}</span>
                            <span class="badge likes-badge">❤️ ${formatNumber(video.likeCount)}</span>
                            <span class="badge">⏱️ ${formatDuration(video.duration)}</span>
                        </div>
                        <div class="video-description">${video.description}</div>
                        <button class="watch-button" onclick="event.preventDefault(); window.open('${video.url}', '_blank');">
                            Kijk op YouTube
                        </button>
                    </div>
                </a>
            `;
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(0) + 'K';
            return num.toString();
        }

        function formatDuration(duration) {
            // Format ISO 8601 duration (e.g., PT1H30M45S) to readable format
            const regex = /PT(\d+H)?(\d+M)?(\d+S)?/;
            const matches = duration.match(regex);

            let result = '';
            if (matches[1]) result += matches[1]; // Hours
            if (matches[2]) result += matches[2]; // Minutes
            if (matches[3]) result += matches[3]; // Seconds

            return result || duration;
        }

        function applyFilters() {
            const languageSelect = document.getElementById('languageSelect').value;
            const sortSelect = document.getElementById('sortSelect').value;
            const searchInput = document.getElementById('searchInput').value.toLowerCase();

            // Apply language filter
            let filtered = allVideos.filter(video => {
                if (languageSelect === 'all') return true;
                const lang = detectLanguage(video.title);
                return lang === languageSelect;
            });

            // Apply search filter
            filtered = filtered.filter(video =>
                video.title.toLowerCase().includes(searchInput) ||
                video.channel.toLowerCase().includes(searchInput)
            );

            // Apply sorting
            let sorted = [...filtered];

            if (sortSelect === 'date-grouped') {
                sorted.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
                renderVideos(sorted, true);
            } else {
                switch(sortSelect) {
                    case 'views':
                        sorted.sort((a, b) => b.viewCount - a.viewCount);
                        break;
                    case 'likes':
                        sorted.sort((a, b) => b.likeCount - a.likeCount);
                        break;
                    case 'duration':
                        sorted.sort((a, b) => {
                            const durationToSeconds = (dur) => {
                                const regex = /PT(\d+H)?(\d+M)?(\d+S)?/;
                                const matches = dur.match(regex);
                                let seconds = 0;
                                if (matches[1]) seconds += parseInt(matches[1]) * 3600;
                                if (matches[2]) seconds += parseInt(matches[2]) * 60;
                                if (matches[3]) seconds += parseInt(matches[3]);
                                return seconds;
                            };
                            return durationToSeconds(b.duration) - durationToSeconds(a.duration);
                        });
                        break;
                }
                renderVideos(sorted, false);
            }
        }

        document.getElementById('languageSelect').addEventListener('change', applyFilters);
        document.getElementById('sortSelect').addEventListener('change', applyFilters);
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        // Load data on page load
        loadData();
    </script>
</body>
</html>
